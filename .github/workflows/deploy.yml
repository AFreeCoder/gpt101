name: Deploy to Silicon

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '部署分支'
        required: true
        default: 'main'
  workflow_run:
    workflows: ['Build and Push Docker Image']
    types: [completed]

concurrency:
  group: silicon-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.event.workflow_run.head_sha }}

      - name: Prepare deploy metadata
        id: prep
        run: |
          DEPLOY_BRANCH="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.event.workflow_run.head_branch }}"
          DEPLOY_SHA="$(git rev-parse HEAD)"
          IMAGE_REPOSITORY="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          echo "deploy_branch=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "image_repository=$IMAGE_REPOSITORY" >> "$GITHUB_OUTPUT"

          echo "准备部署分支: $DEPLOY_BRANCH"
          echo "准备部署提交: $DEPLOY_SHA"
          echo "镜像仓库: $IMAGE_REPOSITORY"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_BRANCH: ${{ steps.prep.outputs.deploy_branch }}
          DEPLOY_SHA: ${{ steps.prep.outputs.deploy_sha }}
          IMAGE_REPOSITORY: ${{ steps.prep.outputs.image_repository }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SILICON_HOST }}
          port: 22222
          username: work
          key: ${{ secrets.SILICON_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: DEPLOY_BRANCH,DEPLOY_SHA,IMAGE_REPOSITORY,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail

            APP_DIR="$HOME/projects/gpt101"
            DEPLOY_DIR="$APP_DIR/deploy"
            BACKUP_DIR="$DEPLOY_DIR/backups"
            REPO_URL="git@github.com:AFreeCoder/gpt101.git"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            DEPLOY_SHA="${DEPLOY_SHA:?DEPLOY_SHA is required}"
            IMAGE_REPOSITORY="${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}"
            APP_IMAGE="${IMAGE_REPOSITORY}:${DEPLOY_SHA}"

            # --- 工具函数 ---

            require_command() {
              command -v "$1" >/dev/null 2>&1 || {
                echo "缺少命令: $1" >&2; exit 1
              }
            }

            require_env() {
              local name="$1"
              if [ -z "${!name:-}" ]; then
                echo "缺少环境变量: $name" >&2
                exit 1
              fi
            }

            upsert_env() {
              local file="$1"
              local key="$2"
              local value="$3"
              if grep -q "^${key}=" "$file"; then
                sed -i.bak "s|^${key}=.*|${key}=${value}|" "$file"
                rm -f "${file}.bak"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            tag_current_image_for_rollback() {
              local current_commit="$1"
              local rollback_ts="$(date +%Y%m%d_%H%M%S)"
              local rollback_tag="gpt101:rollback-${rollback_ts}-${current_commit}"
              local current_image_id
              local current_image_ref

              current_image_id="$(docker inspect --format '{{.Image}}' gpt101 2>/dev/null || true)"
              current_image_ref="$(docker inspect --format '{{.Config.Image}}' gpt101 2>/dev/null || true)"

              if [ -n "$current_image_id" ]; then
                docker image tag "$current_image_id" "$rollback_tag"
                docker image tag "$current_image_id" gpt101:rollback-latest
                {
                  echo "created_at=$rollback_ts"
                  echo "source_commit=$current_commit"
                  echo "source_image=${current_image_ref:-unknown}"
                  echo "rollback_tag=$rollback_tag"
                  echo "rollback_alias=gpt101:rollback-latest"
                } > "$BACKUP_DIR/last-rollback-image.txt"
                echo "已创建回退镜像标签: $rollback_tag"
              else
                echo "未发现正在运行的 gpt101 容器，跳过回退镜像打标"
              fi
            }

            wait_for_health() {
              local name="$1"
              local timeout="${2:-180}"
              local elapsed=0
              while [ "$elapsed" -lt "$timeout" ]; do
                local state
                state="$(docker inspect --format \
                  '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                  "$name" 2>/dev/null || true)"
                case "$state" in
                  healthy|running) echo "$name 状态正常: $state"; return 0 ;;
                  unhealthy|exited|dead)
                    echo "$name 状态异常: $state" >&2
                    docker logs --tail 200 "$name" || true
                    return 1 ;;
                esac
                sleep 5
                elapsed=$((elapsed + 5))
              done
              echo "等待 $name 健康检查超时" >&2
              docker logs --tail 200 "$name" || true
              return 1
            }

            # --- 前置检查 ---

            require_command git
            require_command docker
            require_command gzip
            require_env GHCR_USERNAME
            require_env GHCR_TOKEN

            FREE_KB="$(df -Pk "$HOME" | awk 'NR==2 {print $4}')"
            if [ -z "$FREE_KB" ] || [ "$FREE_KB" -lt $((5 * 1024 * 1024)) ]; then
              echo "可用磁盘不足 5GB，停止部署" >&2
              exit 1
            fi

            # --- 部署前数据库备份 ---

            mkdir -p "$BACKUP_DIR"
            if docker ps --filter "name=^gpt101-postgres$" --format '{{.Names}}' | grep -q .; then
              DB_USER="$(docker exec gpt101-postgres printenv POSTGRES_USER)"
              DB_NAME="$(docker exec gpt101-postgres printenv POSTGRES_DB)"
              if [ -z "$DB_USER" ] || [ -z "$DB_NAME" ]; then
                echo "无法读取数据库用户/库名，停止部署" >&2
                exit 1
              fi

              BACKUP_FILE="${BACKUP_DIR}/pre-deploy-$(date +%Y%m%d_%H%M%S).sql.gz"
              echo "开始部署前备份..."
              docker exec gpt101-postgres pg_dump -U "$DB_USER" -d "$DB_NAME" --clean --if-exists \
                | gzip > "$BACKUP_FILE"

              if [ -s "$BACKUP_FILE" ] && gzip -t "$BACKUP_FILE"; then
                echo "备份成功: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"
                find "$BACKUP_DIR" -name "pre-deploy-*.sql.gz" -mtime +7 -delete
              else
                echo "备份失败，中止部署！" >&2
                rm -f "$BACKUP_FILE"
                exit 1
              fi
            else
              echo "首次部署，跳过数据库备份"
            fi

            # --- 拉取代码 ---

            if [ -d "$APP_DIR/.git" ]; then
              echo "检测到已有 Git 仓库: $APP_DIR"
            elif [ -d "$APP_DIR" ]; then
              BAK_DIR="${APP_DIR}.bak.$(date +%Y%m%d_%H%M%S)"
              echo "目录存在但不是 Git 仓库，备份为: $BAK_DIR"
              mv "$APP_DIR" "$BAK_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            else
              echo "首次部署，克隆仓库..."
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            CURRENT_REMOTE="$(git remote get-url origin 2>/dev/null || true)"
            if [ "$CURRENT_REMOTE" != "$REPO_URL" ]; then
              git remote set-url origin "$REPO_URL"
            fi

            CURRENT_DEPLOY_COMMIT="$(git rev-parse --short=12 HEAD 2>/dev/null || echo unknown)"
            tag_current_image_for_rollback "$CURRENT_DEPLOY_COMMIT"

            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "$DEPLOY_SHA"

            # --- 拉取镜像并部署 ---

            cd "$DEPLOY_DIR"
            if [ ! -f .env ]; then
              echo "缺少 $DEPLOY_DIR/.env，停止部署" >&2
              exit 1
            fi

            APP_COMMIT="$(git rev-parse --short=12 HEAD)"
            echo "部署提交: ${APP_COMMIT} (分支: ${DEPLOY_BRANCH})"
            echo "部署镜像: ${APP_IMAGE}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$APP_IMAGE"
            docker image tag "$APP_IMAGE" gpt101:latest

            upsert_env "$DEPLOY_DIR/.env" APP_IMAGE "$APP_IMAGE"
            upsert_env "$DEPLOY_DIR/.env" APP_IMAGE_REPOSITORY "$IMAGE_REPOSITORY"
            docker compose config -q

            # 清理残留容器（防 Compose recreate 冲突）
            for stale in $(docker ps -a --format '{{.Names}}' | grep -E '^[0-9a-f]+_gpt101'); do
              echo "清理残留容器: $stale"
              docker rm -f "$stale" 2>/dev/null || true
            done

            docker compose up -d --remove-orphans

            # --- 健康检查 ---

            wait_for_health gpt101-postgres 180
            wait_for_health gpt101 300

            # Worker 没有 healthcheck，检查容器是否在运行
            sleep 5
            WORKER_STATE="$(docker inspect --format '{{.State.Status}}' gpt101-worker 2>/dev/null || echo unknown)"
            if [ "$WORKER_STATE" != "running" ]; then
              echo "gpt101-worker 状态异常: $WORKER_STATE" >&2
              docker logs --tail 200 gpt101-worker || true
              exit 1
            fi
            echo "gpt101-worker 状态正常: running"

            # --- 清理 ---

            docker image prune -f
            echo "部署完成！提交: ${APP_COMMIT}，分支: ${DEPLOY_BRANCH}"
