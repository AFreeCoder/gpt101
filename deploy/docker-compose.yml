# =============================================================================
# GPT101 Docker Compose - 生产部署
# =============================================================================
# 部署在 silicon 服务器，包含 Next.js 应用 + Worker 进程 + PostgreSQL
# =============================================================================

services:
  gpt101:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: gpt101
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    ports:
      - '127.0.0.1:3001:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_APP_URL=${APP_URL:-https://gpt101.org}
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-GPT101}
      - NEXT_PUBLIC_DEFAULT_LOCALE=${NEXT_PUBLIC_DEFAULT_LOCALE:-zh}
      - NEXT_PUBLIC_GOOGLE_ADS_CONVERSION_SEND_TO=${NEXT_PUBLIC_GOOGLE_ADS_CONVERSION_SEND_TO:-}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gpt101}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@gpt101-postgres:5432/${POSTGRES_DB:-gpt101}
      - AUTH_URL=${AUTH_URL:-https://gpt101.org}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - GOOGLE_ANALYTICS_ID=${GOOGLE_ANALYTICS_ID:-}
      - GOOGLE_ADS_ID=${GOOGLE_ADS_ID:-}
      - BAIDU_ANALYTICS_ID=${BAIDU_ANALYTICS_ID:-}
    depends_on:
      gpt101-postgres:
        condition: service_healthy
    networks:
      - gpt101-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000']
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 30s

  gpt101-worker:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: gpt101-worker
    restart: unless-stopped
    stop_grace_period: 60s
    mem_limit: 256m
    command: ['node', 'worker.js']
    environment:
      - NODE_ENV=production
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gpt101}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@gpt101-postgres:5432/${POSTGRES_DB:-gpt101}
    depends_on:
      gpt101-postgres:
        condition: service_healthy
    networks:
      - gpt101-network

  gpt101-postgres:
    image: postgres:18-alpine
    container_name: gpt101-postgres
    restart: unless-stopped
    mem_limit: 512m
    volumes:
      - gpt101_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gpt101}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-gpt101}
      - PGDATA=/var/lib/postgresql/data
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - gpt101-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-gpt101} -d ${POSTGRES_DB:-gpt101}',
        ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 一次性运维容器，仅用于 schema 初始化和 RBAC 初始化
  # 日常 docker compose up -d 不会启动此容器
  # 使用方式：docker compose --profile ops run --rm gpt101-ops '...'
  gpt101-ops:
    image: node:20-alpine
    profiles: ['ops']
    working_dir: /workspace
    entrypoint: ['sh', '-lc']
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    networks:
      - gpt101-network

networks:
  gpt101-network:
    driver: bridge

volumes:
  gpt101_postgres_data:
